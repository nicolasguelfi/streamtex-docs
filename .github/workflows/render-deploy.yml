# Render Auto-Deploy — Trigger all Render services on push to main.
#
# Render's GitHub App integration can silently stop firing after consecutive
# build failures.  This workflow uses the Render API directly, bypassing the
# GitHub App and guaranteeing a deploy on every push.
#
# Required secret: RENDER_API_KEY (Render Dashboard → Account Settings → API Keys)
#
# Service IDs are extracted at runtime from render.yaml so the workflow stays
# in sync with the declared services without manual ID maintenance.

name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: render.yaml
          sparse-checkout-cone-mode: false

      - name: Extract service names from render.yaml
        id: services
        run: |
          names=$(grep '^\s*name:' render.yaml | awk '{print $2}' | tr '\n' ' ')
          echo "names=$names" >> "$GITHUB_OUTPUT"
          echo "Services found: $names"

      - name: Resolve service IDs and trigger deploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY secret is not set"
            exit 1
          fi

          # Fetch all services from Render API
          all_services=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services?limit=100")

          failed=0
          for name in ${{ steps.services.outputs.names }}; do
            # Resolve service ID by name
            svc_id=$(echo "$all_services" | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for item in data:
              svc = item.get('service', item)
              if svc.get('name') == '$name':
                  print(svc['id'])
                  break
          ")

            if [ -z "$svc_id" ]; then
              echo "::warning::Service '$name' not found on Render — skipping"
              continue
            fi

            echo "Deploying $name ($svc_id)…"
            http_code=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://api.render.com/v1/services/$svc_id/deploys")

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "  ✓ $name: deploy triggered (HTTP $http_code)"
            else
              echo "::error::$name: deploy failed (HTTP $http_code)"
              cat /tmp/deploy_resp.json
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All deploys triggered successfully."
