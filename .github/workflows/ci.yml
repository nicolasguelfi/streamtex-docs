# StreamTeX Docs CI — Lint references on push/PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --no-sources ignores [tool.uv.sources] so uv resolves streamtex from PyPI
        # instead of the local editable path (../streamtex) which doesn't exist in CI
        run: uv sync --no-sources

      - name: Verify streamtex import
        run: uv run python -c "import streamtex; print(f'streamtex {streamtex.__version__}')"
