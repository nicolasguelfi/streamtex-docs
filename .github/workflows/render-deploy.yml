# Render Auto-Deploy — Trigger Render services on push to main.
#
# Only deploys services whose files actually changed:
#   - Changes in manuals/stx_manual_intro/** → deploy streamtex-intro only
#   - Changes in shared files (Dockerfile, pyproject.toml, shared-blocks/**)
#     → deploy ALL services
#   - workflow_dispatch (manual trigger) → deploy ALL services
#
# The mapping between FOLDER env vars in render.yaml and service names is
# extracted automatically so the workflow stays in sync.
#
# Required secret: RENDER_API_KEY (Render Dashboard → Account Settings → API Keys)

name: Deploy to Render

on:
  # push:              # DISABLED — manual deploy only (free tier limits)
  #   branches: [main] # Uncomment to re-enable auto-deploy when docs are stable
  workflow_dispatch:   # manual trigger always deploys all services

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git diff

      - name: Build service mapping from render.yaml
        id: mapping
        run: |
          # Extract {service_name: folder_path} from render.yaml
          python3 -c "
          import re, json
          content = open('render.yaml').read()
          blocks = re.split(r'(?=^\s+-\s+type:)', content, flags=re.MULTILINE)
          mapping = {}
          for block in blocks:
              nm = re.search(r'name:\s+(\S+)', block)
              fm = re.search(r'key: FOLDER\n\s+value:\s+(\S+)', block)
              if nm and fm:
                  mapping[nm.group(1)] = fm.group(1)
          print(json.dumps(mapping))
          " > /tmp/svc_mapping.json

          cat /tmp/svc_mapping.json
          echo "mapping=$(cat /tmp/svc_mapping.json)" >> "$GITHUB_OUTPUT"

      - name: Detect changed files and select services to deploy
        id: changed
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual trigger — deploying ALL services"
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compare with the previous push SHA to capture ALL commits in the push
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push — deploying ALL services"
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing $BEFORE..$AFTER"
          changed_files=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files:"
          echo "$changed_files"

          # Check for shared/common files that affect ALL services
          shared_patterns="^Dockerfile|^pyproject.toml|^uv.lock|^shared-blocks/|^\.github/|^setup\.py|^scripts/"
          if echo "$changed_files" | grep -qE "$shared_patterns"; then
            echo "Shared files changed — deploying ALL services"
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map changed paths to services
          echo "deploy_all=false" >> "$GITHUB_OUTPUT"
          services=$(python3 -c "
          import json, sys

          mapping = json.load(open('/tmp/svc_mapping.json'))
          changed = '''$changed_files'''.strip().split('\n')

          to_deploy = set()
          for f in changed:
              for svc_name, folder in mapping.items():
                  if f.startswith(folder + '/') or f == folder:
                      to_deploy.add(svc_name)

          print(' '.join(sorted(to_deploy)))
          ")

          echo "Services to deploy: ${services:-none}"
          echo "services=$services" >> "$GITHUB_OUTPUT"

      - name: Resolve service IDs and trigger deploys
        if: steps.changed.outputs.deploy_all == 'true' || steps.changed.outputs.services != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY secret is not set"
            exit 1
          fi

          DEPLOY_ALL="${{ steps.changed.outputs.deploy_all }}"
          SELECTED="${{ steps.changed.outputs.services }}"

          # Determine which services to deploy
          if [ "$DEPLOY_ALL" = "true" ]; then
            targets=$(python3 -c "
          import json
          mapping = json.load(open('/tmp/svc_mapping.json'))
          print(' '.join(sorted(mapping.keys())))
          ")
          else
            targets="$SELECTED"
          fi

          echo "Deploying: $targets"

          # Fetch all services from Render API (one call)
          all_services=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services?limit=100")

          failed=0
          deployed=0
          for name in $targets; do
            # Resolve service ID by name
            svc_id=$(echo "$all_services" | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for item in data:
              svc = item.get('service', item)
              if svc.get('name') == '$name':
                  print(svc['id'])
                  break
          ")

            if [ -z "$svc_id" ]; then
              echo "::warning::Service '$name' not found on Render — skipping"
              continue
            fi

            echo "Deploying $name ($svc_id)…"
            http_code=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://api.render.com/v1/services/$svc_id/deploys")

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "  ✓ $name: deploy triggered (HTTP $http_code)"
              deployed=$((deployed + 1))
            else
              echo "::error::$name: deploy failed (HTTP $http_code)"
              cat /tmp/deploy_resp.json
              failed=1
            fi
          done

          echo ""
          echo "Summary: $deployed service(s) deployed"

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi

      - name: No deploy needed
        if: steps.changed.outputs.deploy_all != 'true' && steps.changed.outputs.services == ''
        run: echo "No Render services affected by this push — skipping deploy."
